services:
  mongodb:
    image: mongo:7.0
    container_name: workspace-permission-management-mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\""]
      interval: 5s
      timeout: 10s
      retries: 10
    environment:
      MONGO_INITDB_DATABASE: workspace_permission_management
    networks:
      - workspace_permission_management

  mongo-init:
    image: mongo:7.0
    container_name: workspace-permission-management-mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: ["mongosh"]
    command:
      - "--host"
      - "mongodb:27017"
      - "--quiet"
      - "--eval"
      - |
        try {
          rs.status();
        } catch (error) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "mongodb:27017" }]
          });
        }

        for (let attempt = 0; attempt < 30; attempt++) {
          if (db.hello().isWritablePrimary) {
            quit(0);
          }
          sleep(1000);
        }

        throw new Error("MongoDB replica set did not elect a primary");
    networks:
      - workspace_permission_management

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: workspace-permission-management-mongo-express
    ports:
      - "9000:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks:
      - workspace_permission_management

  nats:
    image: nats:2.10-alpine
    container_name: workspace-permission-management-nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - workspace_permission_management

  nats-init:
    image: natsio/nats-box:0.19.3
    container_name: workspace-permission-management-nats-init
    depends_on:
      - nats
    restart: "no"
    environment:
      FUNCTION_SERVICE_NATS_URL: nats://nats:4222
      FUNCTION_SERVICE_JETSTREAM_STREAM: ${FUNCTION_SERVICE_JETSTREAM_STREAM:-FUNCTION_RESOURCES}
      FUNCTION_SERVICE_JETSTREAM_DURABLE: ${FUNCTION_SERVICE_JETSTREAM_DURABLE:-function-service-resource-upserter}
      FUNCTION_SERVICE_JETSTREAM_SUBJECT: ${FUNCTION_SERVICE_JETSTREAM_SUBJECT:-app.todo.resource.upserted}
      FUNCTION_SERVICE_RESOURCE_DELETED_SUBJECT: ${FUNCTION_SERVICE_RESOURCE_DELETED_SUBJECT:-app.todo.resource.deleted}
      GROUP_SERVICE_NATS_URL: nats://nats:4222
      GROUP_SERVICE_GROUP_EXPIRY_COMMAND_STREAM: ${GROUP_SERVICE_GROUP_EXPIRY_COMMAND_STREAM:-GROUP_EXPIRY}
      GROUP_SERVICE_GROUP_EXPIRY_COMMAND_DURABLE: ${GROUP_SERVICE_GROUP_EXPIRY_COMMAND_DURABLE:-group-service-expiry}
      GROUP_SERVICE_GROUP_EXPIRY_COMMAND_SUBJECT: ${GROUP_SERVICE_GROUP_EXPIRY_COMMAND_SUBJECT:-app.todo.group.expiry.process}
    entrypoint: ["/bin/sh", "-euc"]
    command:
      - |
        until nats --server "$$FUNCTION_SERVICE_NATS_URL" stream ls >/dev/null 2>&1; do
          sleep 1
        done

        if ! nats --server "$$FUNCTION_SERVICE_NATS_URL" stream info "$$FUNCTION_SERVICE_JETSTREAM_STREAM" >/dev/null 2>&1; then
          nats --server "$$FUNCTION_SERVICE_NATS_URL" stream add "$$FUNCTION_SERVICE_JETSTREAM_STREAM" \
            --subjects "$$FUNCTION_SERVICE_JETSTREAM_SUBJECT,$$FUNCTION_SERVICE_RESOURCE_DELETED_SUBJECT" \
            --storage file \
            --retention limits \
            --discard old \
            --replicas 1 \
            --defaults
        fi

        if ! nats --server "$$FUNCTION_SERVICE_NATS_URL" consumer info "$$FUNCTION_SERVICE_JETSTREAM_STREAM" "$$FUNCTION_SERVICE_JETSTREAM_DURABLE" >/dev/null 2>&1; then
          nats --server "$$FUNCTION_SERVICE_NATS_URL" consumer add "$$FUNCTION_SERVICE_JETSTREAM_STREAM" "$$FUNCTION_SERVICE_JETSTREAM_DURABLE" \
            --filter "$$FUNCTION_SERVICE_JETSTREAM_SUBJECT" \
            --pull \
            --ack explicit \
            --deliver all \
            --replay instant \
            --max-deliver=-1 \
            --defaults
        fi

        if ! nats --server "$$GROUP_SERVICE_NATS_URL" stream info "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_STREAM" >/dev/null 2>&1; then
          nats --server "$$GROUP_SERVICE_NATS_URL" stream add "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_STREAM" \
            --subjects "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_SUBJECT" \
            --storage file \
            --retention limits \
            --discard old \
            --replicas 1 \
            --defaults
        fi

        if ! nats --server "$$GROUP_SERVICE_NATS_URL" consumer info "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_STREAM" "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_DURABLE" >/dev/null 2>&1; then
          nats --server "$$GROUP_SERVICE_NATS_URL" consumer add "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_STREAM" "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_DURABLE" \
            --filter "$$GROUP_SERVICE_GROUP_EXPIRY_COMMAND_SUBJECT" \
            --pull \
            --ack explicit \
            --deliver all \
            --replay instant \
            --max-deliver=-1 \
            --defaults
        fi
    networks:
      - workspace_permission_management

networks:
  workspace_permission_management:
    name: workspace_permission_management

volumes:
  mongodb_data:
  nats_data:
