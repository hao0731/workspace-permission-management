name: PR Check

on:
  pull_request:
    branches:
      - "**"

env:
  GO_VERSION: "1.25.0"

jobs:
  backend-checks:
    name: Go Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
          args: ./...
          verify: false # golangci-lint has an issue for check JSON schema